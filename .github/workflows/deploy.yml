name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate admins.js from secrets
        run: |
          cat > admins.js << 'EOF'
          // This file is auto-generated during build – do not commit
          export const defaultAdmins = [
            {
              username: 'dev',
              passwordHash: '${{ secrets.ADMIN_PASSWORD_HASH_DEV }}',
              totpSecret: '${{ secrets.ADMIN_TOTP_SECRET_DEV }}'
            },
            {
              username: 'owner',
              passwordHash: '${{ secrets.ADMIN_PASSWORD_HASH_OWNER }}',
              totpSecret: '${{ secrets.ADMIN_TOTP_SECRET_OWNER }}'
            }
          ];
          EOF
          cat admins.js   # 调试：显示生成的内容

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .                # 要部署的文件夹（当前根目录）
          branch: gh-pages          # 部署到 gh-pages 分支
          clean: true               # 清理旧文件
          clean-exclude: |
            .gitignore
            .nojekyll