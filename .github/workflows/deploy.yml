name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate admins.js from secrets
        run: |
          cat > admins.js << 'EOF'
          // This file is auto-generated during build – do not commit
          export const defaultAdmins = [
            {
              username: 'dev',
              passwordHash: '${{ secrets.ADMIN_PASSWORD_HASH_DEV }}',
              totpSecret: '${{ secrets.ADMIN_TOTP_SECRET_DEV }}'
            },
            {
              username: 'owner',
              passwordHash: '${{ secrets.ADMIN_PASSWORD_HASH_OWNER }}',
              totpSecret: '${{ secrets.ADMIN_TOTP_SECRET_OWNER }}'
            }
          ];
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true